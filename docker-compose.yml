# ============================================================
# GlobeCase — production stack for a single Ubuntu VPS
# (Contabo / Hetzner). Usage:
#   cp .env.example .env.production   # fill in real secrets
#   docker compose up -d --build
# Add the reverse proxy + TLS with the `proxy` profile:
#   docker compose --profile proxy up -d --build
#
# All services read config from .env.production via `env_file` (NOT ${...}
# interpolation, which Compose only reads from a file literally named `.env`).
# ============================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globecase"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Only reachable inside the compose network.
    expose:
      - "5432"

  migrate:
    build:
      context: .
      target: migrator
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    env_file: .env.production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Persist admin image uploads across rebuilds.
    volumes:
      - uploads:/app/public/uploads
    # Bound to localhost only; the public entrypoint is Nginx (proxy profile).
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    profiles: ["proxy"]
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro

volumes:
  db-data:
  uploads:
