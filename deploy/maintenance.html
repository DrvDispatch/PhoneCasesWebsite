<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GlobeCase — We'll be right back</title>
<meta name="description" content="GlobeCase is temporarily offline for maintenance. We'll be back online shortly.">
<style>
  :root{
    --brand:#1a3c34;
    --brand-deep:#0f2a23;
    --accent:#c8964e;
    --ink:#eef2f0;
    --muted:rgba(238,242,240,.72);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:radial-gradient(1200px 720px at 50% -12%, #26564a 0%, var(--brand) 44%, var(--brand-deep) 100%);
    display:flex; align-items:center; justify-content:center;
    min-height:100dvh; padding:36px 22px; text-align:center;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; width:100%}
  .brand{font-size:26px; font-weight:800; letter-spacing:.5px; margin-bottom:44px}
  .brand .c{color:var(--accent)}
  .globe{width:122px; height:122px; margin:0 auto 32px; animation:float 6s ease-in-out infinite}
  .globe svg{width:100%; height:100%; display:block}
  .ring{transform-origin:60px 60px; animation:spin 28s linear infinite}
  h1{font-size:clamp(27px,6vw,38px); line-height:1.15; margin:0 0 16px; font-weight:800}
  p{font-size:clamp(15px,3.6vw,17px); line-height:1.65; color:var(--muted); margin:0 auto; max-width:45ch}
  .bar{position:relative; height:4px; width:184px; margin:36px auto 0; background:rgba(255,255,255,.14); border-radius:99px; overflow:hidden}
  .bar::after{content:""; position:absolute; top:0; bottom:0; width:40%; left:-40%;
    background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:slide 1.9s ease-in-out infinite}
  .foot{margin-top:46px; font-size:13px; color:rgba(238,242,240,.5); letter-spacing:.3px}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes slide{0%{left:-40%}100%{left:100%}}
  @media (prefers-reduced-motion:reduce){.globe,.ring,.bar::after{animation:none}}
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">Globe<span class="c">Case</span></div>
    <div class="globe" aria-hidden="true">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="46" stroke="#c8964e" stroke-width="2"/>
        <g class="ring" stroke="#c8964e" stroke-width="1.5" opacity=".9">
          <ellipse cx="60" cy="60" rx="20" ry="46"/>
          <ellipse cx="60" cy="60" rx="40" ry="46"/>
          <line x1="14" y1="60" x2="106" y2="60"/>
          <line x1="60" y1="14" x2="60" y2="106"/>
          <path d="M20 40 Q60 52 100 40"/>
          <path d="M20 80 Q60 68 100 80"/>
        </g>
      </svg>
    </div>
    <h1>We&rsquo;ll be right back</h1>
    <p>GlobeCase is getting a quick upgrade. We&rsquo;re polishing a few things behind the scenes and will be back online shortly &mdash; thanks for your patience.</p>
    <div class="bar" aria-hidden="true"></div>
    <div class="foot">Worldwide free shipping &middot; 7-day returns</div>
  </main>
</body>
</html>
