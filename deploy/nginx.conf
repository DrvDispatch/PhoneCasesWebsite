# ============================================================
# GlobeCase reverse proxy (Nginx) — production for globe-case.com
# Fronted by Cloudflare (proxied). TLS via Let's Encrypt (DNS-01).
# The 443 block is active; certificates must exist before nginx starts
# (they are issued by certbot before `docker compose --profile proxy up`).
# ============================================================

upstream globecase_app {
    server app:3000;
}

# --- HTTP: ACME challenge + redirect everything to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name globe-case.com www.globe-case.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name globe-case.com www.globe-case.com;

    ssl_certificate     /etc/letsencrypt/live/globe-case.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globe-case.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 12m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location / {
        proxy_pass http://globecase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Cloudflare puts the visitor IP in X-Forwarded-For; keep the chain.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
