# ============================================================
# GlobeCase — MAINTENANCE mode reverse proxy (Nginx)
# Serves a themed "we'll be right back" page for every route while the
# app + database are stopped. Uses the same Let's Encrypt cert as prod,
# returns a proper 503 + Retry-After (so crawlers treat it as temporary),
# and keeps the ACME challenge path open for cert renewals.
#
#   Enable : docker compose --profile maintenance up -d maintenance
#   Disable: docker compose rm -sf maintenance && docker compose --profile proxy up -d
# ============================================================

# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name globe-case.com www.globe-case.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: styled 503 for everything ---
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name globe-case.com www.globe-case.com;

    ssl_certificate     /etc/letsencrypt/live/globe-case.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globe-case.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Every request → the branded maintenance page with a real 503.
    location / {
        return 503;
    }

    error_page 503 =503 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        add_header Retry-After 3600 always;
        add_header Cache-Control "no-store" always;
        internal;
    }
}
