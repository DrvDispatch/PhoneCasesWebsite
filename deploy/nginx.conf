# ============================================================
# GlobeCase reverse proxy (Nginx)
# Replace globecase.com with your domain. See DEPLOY.md for the
# certbot/TLS steps. Until certs exist, the HTTP server below
# already proxies the app so you can test on port 80.
# ============================================================

upstream globecase_app {
    server app:3000;
}

# --- ACME challenge + HTTP ---
server {
    listen 80;
    listen [::]:80;
    server_name globecase.com www.globecase.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Once TLS is set up, uncomment to force HTTPS:
    # location / { return 301 https://$host$request_uri; }

    location / {
        proxy_pass http://globecase_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

